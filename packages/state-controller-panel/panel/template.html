<div class="panel-shell">
    <aside class="sidebar">
        <div class="sidebar-toolbar">
            <button id="btn-install-core" class="btn btn-primary" title="安装核心脚本">📥 W3:安装核心</button>
            <button id="btn-codegen" class="btn btn-ghost" disabled title="TODO W5:CodeGen">TODO W5:CodeGen</button>
            <button id="btn-capabilities" class="btn btn-ghost" disabled title="TODO W4:Capabilities">TODO W4:Capabilities</button>
            <button id="btn-settings" class="btn btn-icon" disabled title="设置">🔍</button>
        </div>

        <div id="states-list" class="states-list"></div>

        <div class="sidebar-footer">
            <button id="btn-add-state" class="btn btn-wide btn-primary">+ Add New State</button>
            <button class="btn btn-wide btn-ghost" disabled>TODO W4:Save Preset</button>
            <button class="btn btn-wide btn-ghost" disabled>TODO W5:Compare</button>
            <button class="btn btn-wide btn-ghost" disabled>TODO W5:场景组合</button>
        </div>
    </aside>

    <main class="main-content">
        <div class="main-toolbar">
            <span class="field-label">控制器 id</span>
            <div id="ctrl-switch-wrap" class="ctrl-switch-wrap">
                <button id="btn-prev-ctrl" class="btn btn-icon" title="上一个控制器">‹</button>
                <button id="btn-ctrl-switch" class="btn ctrl-switch" title="切换控制器">未连接 ▾</button>
                <button id="btn-next-ctrl" class="btn btn-icon" title="下一个控制器">›</button>
            </div>
        </div>

        <section id="state-detail" class="state-detail" style="display: none;">
            <div class="shared-strip">
                <div class="strip-field">
                    <span class="field-label">state</span>
                    <button id="btn-state-pick" class="btn state-pick">-- ▾</button>
                </div>
                <div class="record-actions">
                    <button id="btn-start-record" class="btn btn-record">🔴 录制</button>
                    <button id="btn-stop-record" class="btn btn-stop" style="display: none;">⏹ 停止并保存</button>
                    <button id="btn-cancel-record" class="btn btn-cancel" style="display: none;">⤺ 撤销本次录制</button>
                </div>
            </div>

            <div class="detail-head">
                <div>
                    <div class="eyebrow">当前详情</div>
                    <h2 id="state-title" class="state-title">--</h2>
                </div>
                <div id="record-badge" class="record-badge">Idle</div>
            </div>

            <div class="prop-grid">
                <section class="prop-panel">
                    <button id="btn-followed-toggle" class="prop-panel-title" type="button">▾ 已跟随属性 <span id="followed-count">(0)</span></button>
                    <div id="followed-props" class="prop-list"></div>
                </section>

                <section class="prop-panel">
                    <button id="btn-ready-toggle" class="prop-panel-title" type="button">▾ 可接入属性 <span id="ready-count">(0)</span></button>
                    <div id="ready-props" class="prop-list"></div>
                </section>
            </div>
        </section>

        <section id="empty-tip" class="empty-tip">
            <h3>请在场景中选中带 StateController 的节点</h3>
            <p>或从下方列表选择：</p>
            <div id="ctrl-list" class="ctrl-list"></div>
        </section>
    </main>
</div>

<template id="tpl-state-item">
    <div class="state-item">
        <div class="state-thumb">Img</div>
        <div class="state-meta">
            <div class="state-name">State_Name</div>
            <div class="state-sub">state</div>
        </div>
        <div class="state-actions">
            <span class="record-dot" title="录制中">●</span>
            <button class="btn btn-icon btn-del-state" title="删除">Del</button>
            <button class="btn btn-icon btn-dup-state" disabled title="TODO W4">Dup</button>
        </div>
    </div>
</template>

<template id="tpl-prop-item">
    <div class="prop-item">
        <div class="prop-main">
            <span class="prop-mark">●</span>
            <span class="prop-name">propName</span>
            <span class="prop-value">--</span>
        </div>
        <button class="btn btn-small btn-prop-action">☐ 取消跟随</button>
    </div>
</template>

<template id="tpl-ctrl-item">
    <div class="ctrl-item">
        <span class="ctrl-name">CtrlName</span>
        <button class="btn btn-small btn-use-ctrl">选择</button>
    </div>
</template>
